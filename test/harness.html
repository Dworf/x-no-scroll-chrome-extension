<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>x-no-scroll — offline test harness</title>
<style>
  html, body { margin: 0; padding: 0; }
  body { font: 14px/1.4 -apple-system, system-ui, sans-serif; }
  /* Fixed results panel so it never affects the scrolling timeline */
  #results {
    position: fixed; top: 8px; right: 8px; width: 360px; max-height: 92vh; overflow: auto;
    background: #0f1419; color: #e7e9ea; border: 1px solid #2f3336; border-radius: 10px;
    padding: 10px 12px; z-index: 99999; box-shadow: 0 6px 24px rgba(0,0,0,.4);
  }
  #results h1 { font-size: 14px; margin: 0 0 8px; }
  #results .case { padding: 4px 0; border-top: 1px solid #2f3336; }
  #results .pass { color: #00ba7c; }
  #results .fail { color: #f4212e; }
  #results .summary { margin-top: 8px; font-weight: 700; }
  /* Mimic X: a sticky top bar so the timeline starts ~120px down */
  header.topbar {
    position: sticky; top: 0; height: 53px; background: #16181c; color: #e7e9ea;
    display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid #2f3336; z-index: 10;
  }
  .article-fill { padding: 12px 16px; border-bottom: 1px solid #2f3336; box-sizing: border-box; }
</style>
</head>
<body>
  <header class="topbar">Mock X — Home</header>

  <!-- Mirrors X's structure: region[aria-label^=Timeline] > div[min-height] (virtual container) > cellInnerDiv* -->
  <section role="region" aria-label="Timeline: Your Home Timeline">
    <div id="vcontainer" style="position: relative; min-height: 0px;"></div>
  </section>

  <div id="results"><h1>x-no-scroll test harness</h1><div id="rows"></div><div id="sum" class="summary">running…</div></div>

  <!-- The content script under test is loaded dynamically with a cache-buster (below). -->

  <script>
  // ----------------------------------------------------------------------------
  // Mock of X's virtualized home timeline.
  //   * The PAGE scrolls (document.scrollingElement), like x.com.
  //   * Posts live in a data array; only those near the viewport are mounted as
  //     [data-testid="cellInnerDiv"] cells with transform: translateY(offset).
  //   * Off-screen cells are UNMOUNTED (this is what defeats native anchoring and
  //     forces the height-delta self-heal path on big prepends).
  //   * Prepending does NOT touch scrollTop (verified real X behavior).
  // ----------------------------------------------------------------------------
  const HEADER = 53;          // sticky topbar height (timeline starts below it)
  const BUFFER = 800;         // render margin above/below viewport (X renders a small window)
  const container = document.getElementById('vcontainer');

  let posts = [];             // index 0 = newest/top.  {id, h}
  let nextId = 1000;          // X status ids grow over time; newer = larger

  function makePosts(n, heights) {
    const arr = [];
    for (let i = 0; i < n; i++) {
      nextId += 1;
      const h = heights ? heights[i % heights.length] : (180 + ((i * 137) % 700));
      arr.push({ id: String(nextId), h });
    }
    return arr;
  }

  function offsets() {
    const off = []; let y = 0;
    for (const p of posts) { off.push(y); y += p.h; }
    return { off, total: y };
  }

  function render() {
    const { off, total } = offsets();
    container.style.minHeight = total + 'px';
    const top = document.scrollingElement.scrollTop;
    const vh = window.innerHeight;
    const lo = top - BUFFER, hi = top + vh + BUFFER;

    // Which posts should be mounted?
    const want = new Map(); // id -> {p, y}
    for (let i = 0; i < posts.length; i++) {
      const y = off[i], p = posts[i];
      if (y + p.h >= lo && y <= hi) want.set(p.id, { p, y });
    }
    // Remove cells no longer wanted (UNMOUNT)
    for (const cell of Array.from(container.children)) {
      if (!want.has(cell.dataset.pid)) cell.remove();
    }
    // Add/update wanted cells
    const have = new Set(Array.from(container.children).map(c => c.dataset.pid));
    for (const { p, y } of want.values()) {
      let cell = container.querySelector('[data-pid="' + p.id + '"]');
      if (!cell) {
        cell = document.createElement('div');
        cell.dataset.pid = p.id;
        cell.setAttribute('data-testid', 'cellInnerDiv');
        cell.style.cssText = 'position:absolute; width:100%;';
        cell.innerHTML =
          '<article data-testid="tweet">' +
            '<a href="/user/status/' + p.id + '">@user · post ' + p.id + '</a>' +
            '<div class="article-fill" style="height:' + (p.h - 1) + 'px;">post ' + p.id + '</div>' +
          '</article>';
        container.appendChild(cell);
      }
      cell.style.transform = 'translateY(' + y + 'px)';
      // keep declared height in sync (used when below-fold resize happens)
      const fill = cell.querySelector('.article-fill');
      if (fill) fill.style.height = (p.h - 1) + 'px';
    }
  }

  window.addEventListener('scroll', render, { passive: true });
  window.addEventListener('resize', render);

  // Mock operations -----------------------------------------------------------
  const sleep = ms => new Promise(r => setTimeout(r, ms));

  async function prepend(n, mode, heights) {
    const fresh = makePosts(n, heights);
    if (mode === 'instant') {
      posts = fresh.concat(posts); render();
    } else if (mode === 'chunked') {
      for (let i = 0; i < fresh.length; i += 5) {
        posts = fresh.slice(i, i + 5).concat(posts); render(); await sleep(60);
      }
      // note: chunks above unshift in wrong order; fix by rebuilding from fresh order
    } else if (mode === 'slow') {
      for (let i = fresh.length - 1; i >= 0; i--) { posts = [fresh[i]].concat(posts); render(); await sleep(40); }
    }
    await sleep(80); // let media/observers settle
  }

  function resizeBelowFold(deltaPx) {
    // grow a post that's well below the viewport
    const top = document.scrollingElement.scrollTop, vh = window.innerHeight;
    const { off } = offsets();
    for (let i = 0; i < posts.length; i++) {
      if (off[i] > top + vh + 400) { posts[i].h += deltaPx; render(); return posts[i].id; }
    }
    return null;
  }

  // Mimic X's real behavior: clicking a "Show N posts" pill makes X call
  // scrollToNewest() -> window.scrollTo(0) + window.scrollBy(...), yanking you to the top.
  // (Discovered live: this — not content insertion — is what moves your view.)
  function xScrollToNewest() {
    window.scrollTo(0, 0);                              // initial jump (may precede our correction)
    setTimeout(() => window.scrollTo(0, 0), 40);
    setTimeout(() => window.scrollTo(0, 0), 110);
  }

  async function prependWithYank(n, heights) {
    const fresh = makePosts(n, heights);
    posts = fresh.concat(posts); render();
    xScrollToNewest();
    await sleep(450);
  }

  // Test utilities ------------------------------------------------------------
  function cellTop(id) {
    const c = container.querySelector('[data-pid="' + id + '"]');
    return c ? c.getBoundingClientRect().top : null;
  }
  // anchor = topmost tweet whose bottom is below the header
  function topmostAnchorId() {
    let best = null, bestTop = Infinity;
    for (const c of container.querySelectorAll('[data-testid="cellInnerDiv"]')) {
      const r = c.getBoundingClientRect();
      if (r.bottom > HEADER + 1 && r.top < bestTop) { bestTop = r.top; best = c.dataset.pid; }
    }
    return best;
  }

  const rows = document.getElementById('rows');
  let passCount = 0, failCount = 0;
  function record(name, ok, detail) {
    const div = document.createElement('div');
    div.className = 'case ' + (ok ? 'pass' : 'fail');
    div.textContent = (ok ? '✓ ' : '✗ ') + name + (detail ? '  — ' + detail : '');
    rows.appendChild(div);
    ok ? passCount++ : failCount++;
    console.log('[xns-test] ' + (ok ? 'PASS' : 'FAIL') + ' : ' + name + (detail ? ' — ' + detail : ''));
  }

  const TOL = 3; // px

  // Put the viewport at y (as if the user scrolled here), and let the resulting scroll event
  // flush BEFORE anyone arms — so positioning never looks like a "user scrolled while armed".
  async function place(y) {
    if (window.__xnsReset) window.__xnsReset();   // isolate each case from the previous one's armed/defend state
    document.scrollingElement.scrollTop = y;
    render();
    await sleep(60);
  }
  // Simulate clicking a "Show posts" pill: a click anywhere arms the engine (captures the anchor).
  function clickArm() {
    container.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true }));
  }

  // Read the anchor's on-screen top after letting pending corrections flush. In a real browser
  // the MutationObserver corrects before paint; the harness must not measure a frame too early.
  async function settleTop(id) {
    let last = null, stable = 0;
    for (let i = 0; i < 25; i++) {
      render();
      await sleep(40);
      const t = cellTop(id);
      if (t != null && t === last) { if (++stable >= 2) return t; } else stable = 0;
      last = t;
    }
    return last;
  }

  async function run() {
    window.__xnsTest = true; // let the content script treat this page as the home timeline
    // Seed a tall feed and start the content script under test.
    posts = makePosts(40);
    render();
    if (typeof window.__xnsStart === 'function') window.__xnsStart();
    else console.log('[xns-test] __xnsStart not defined — content script not implemented yet');

    // Feature cases: a click arms the engine, then a load must keep the clicked-at post in place.

    // ---- Case A: small prepend at top, anchor stays mounted ----
    await place(0); clickArm();
    let id = topmostAnchorId(); let before = cellTop(id);
    await prepend(5, 'instant');
    let after = await settleTop(id);
    record('A: small prepend keeps anchor (mounted)', after != null && Math.abs(after - before) <= TOL,
           'before=' + before + ' after=' + after);

    // ---- Case B: BIG prepend at top, anchor UNMOUNTS → self-heal ----
    await place(0); clickArm();
    id = topmostAnchorId(); before = cellTop(id);
    await prepend(60, 'instant');
    after = await settleTop(id);
    record('B: big prepend self-heals (anchor unmounts)', after != null && Math.abs(after - before) <= TOL,
           'before=' + before + ' after=' + after);

    // ---- Case C: big prepend delivered SLOWLY in chunks ----
    await place(0); clickArm();
    id = topmostAnchorId(); before = cellTop(id);
    await prepend(6, 'slow');
    after = await settleTop(id);
    record('C: slow/chunked prepend keeps anchor', after != null && Math.abs(after - before) <= TOL,
           'before=' + before + ' after=' + after);

    // ---- Case D: scrolled DOWN, click, prepend (Case 2 analogue) ----
    await place(2500); clickArm();
    id = topmostAnchorId(); before = cellTop(id);
    await prepend(30, 'instant');
    after = await settleTop(id);
    record('D: prepend while scrolled down keeps anchor', after != null && Math.abs(after - before) <= TOL,
           'before=' + before + ' after=' + after);

    // ---- Case E: GATING — armed, but a below-fold resize must NOT move the view ----
    await place(1500); clickArm();
    id = topmostAnchorId(); before = cellTop(id);
    resizeBelowFold(120); await sleep(120);
    after = await settleTop(id);
    record('E: below-fold resize does not move view (gating)', after != null && Math.abs(after - before) <= TOL,
           'before=' + before + ' after=' + after);

    // ---- Case F: normal scrolling with NO click is never touched ----
    await place(1000);
    await place(1800);
    await sleep(150);
    after = Math.round(document.scrollingElement.scrollTop);
    record('F: normal scrolling (no click) untouched', Math.abs(after - 1800) <= TOL, 'scrollTop=' + after);

    // ---- Case G: click, then X yanks to top (scrollToNewest) during prepend ----
    await place(0); clickArm();
    id = topmostAnchorId(); before = cellTop(id);
    await prependWithYank(6);
    after = await settleTop(id);
    record('G: holds anchor despite X scrollToNewest', after != null && Math.abs(after - before) <= TOL,
           'before=' + before + ' after=' + after);

    // ---- Case H: clicked while SLIGHTLY SCROLLED, then X yanks to top (the live "Show 82" case) ----
    await place(40); clickArm();
    id = topmostAnchorId(); before = cellTop(id);
    await prependWithYank(8);
    after = await settleTop(id);
    record('H: holds anchor when slightly scrolled + scrollToNewest', after != null && Math.abs(after - before) <= TOL,
           'before=' + before + ' after=' + after);

    // ---- Case I: scrollbar drag with NO click, then a load — must be fully passive (no jump) ----
    await place(0);
    document.scrollingElement.scrollTop = 1500;       // scrollbar drag: a bare scroll, no click
    render(); await sleep(120);
    await prepend(8, 'instant');                        // a load happens, but we never clicked
    await sleep(200);
    after = Math.round(document.scrollingElement.scrollTop);
    record('I: scrollbar drag + load with no click → no jump', Math.abs(after - 1500) <= 6, 'scrollTop=' + after);

    // ---- Case J: click, then the user scrolls away (scrollbar) → disarm → load must NOT yank back ----
    await place(0); clickArm();
    document.scrollingElement.scrollTop = 1200;        // user changes mind, drags the scrollbar
    window.dispatchEvent(new Event('scroll'));          // a scrollbar drag fires scroll events
    render(); await sleep(150);
    await prepend(6, 'instant');
    await sleep(200);
    after = Math.round(document.scrollingElement.scrollTop);
    record('J: user scroll after click disarms; load does not yank', Math.abs(after - 1200) <= 6, 'scrollTop=' + after);

    document.getElementById('sum').textContent =
      'RESULT: ' + passCount + ' passed, ' + failCount + ' failed';
    console.log('[xns-test] DONE ' + passCount + ' passed, ' + failCount + ' failed');
    window.__xnsTestResults = { pass: passCount, fail: failCount };
  }

  // Load content.js fresh every time (cache-buster) so test runs never use a stale build.
  window.addEventListener('load', () => {
    const s = document.createElement('script');
    s.src = '../src/content.js?cb=' + Date.now();
    s.onload = () => setTimeout(run, 100);
    document.body.appendChild(s);
  });
  </script>
</body>
</html>
